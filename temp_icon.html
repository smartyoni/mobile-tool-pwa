<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; padding: 0; background: transparent; }
  #icon {
    width: 512px;
    height: 512px;
    background-color: #5e5ce6; /* Match the icon color */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: white;
    font-family: 'Pretendard', sans-serif;
    font-weight: 800;
    line-height: 1.1;
  }
  .row {
    font-size: 160px;
    letter-spacing: -4px;
  }
</style>
</head>
<body>
  <div id="icon">
    <div class="row">도구</div>
    <div class="row">모음</div>
  </div>
</body>
</html>
